<script>
const DOC = "Family History";
const PAGES = [

{cover:true, html:`
  <div class="c-top"><span class="c-mark">🌳</span><span class="c-pill">A Family History</span></div>
  <div class="c-mid">
    <div class="c-eyebrow">Arocho &middot; Marrero &middot; Cardona &middot; Huertas</div>
    <h1>The Line <span class="accent">to Omar</span></h1>
    <p class="c-sub">From a farming family in Añasco and Lares, Puerto Rico &mdash; to the day they got to me.</p>
    <div class="c-meta">
      <div class="cm-l"><div class="cm-by">Researched and compiled by Claude, for Omar Huertas</div><div class="cm-rel">First edition &middot; July 2026</div></div>
      <div class="cm-r">Sourced from FamilySearch, Ancestry, primary family documents, and a headstone in Arecibo.</div>
    </div>
  </div>`},

{doc:"How We Know This", html:`
  <span class="eyebrow">Before the story begins</span>
  <h1>How we know this is true.</h1>
  <p class="lead">Every name in this book was checked, not assumed.</p>
  <p>This story began with a photograph of a headstone at Cementerio Privado La Santa Cruz, in Arecibo, Puerto Rico. From there, it was built outward &mdash; person by person, record by record &mdash; using FamilySearch's sourced civil and parish registrations, an Ancestry.com printout your mother compiled, and primary documents like a funeral card and downloaded Puerto Rico civil registry certificates.</p>
  <p>Along the way, a tempting but false lead surfaced: a chain that appeared to connect this family to Spanish nobility and the Aztec emperor Moctezuma I. It was checked and rejected &mdash; a real but unrelated Colombian family, wrongly merged onto one ancestor's profile by another researcher, with no genuine documentation connecting it here. That branch is not in this book. What follows is only what could be verified.</p>
  <div class="who">Where a date or fact isn't certain, this book says so &mdash; the same way the family tree site does.</div>`},

{doc:"The World Before", html:`
  <span class="eyebrow">Setting the scene &middot; not your family's own record</span>
  <h1>Añasco, before anyone in this book was born.</h1>
  <p class="lead">To understand the family, it helps to understand the ground they stood on.</p>
  <p>Añasco was founded in 1733 by a colonist from Extremadura, Spain, on land already inhabited by the Taíno people for centuries &mdash; the region is believed to be where the Taíno rebellion against Spanish rule first broke out in the early 1500s. By the time Máximo Arocho and María Ramona Román were born there, generations later, Añasco had settled into what it would remain for the next two hundred years: a rural farming town, growing plantains and provisions along the Río Grande de Añasco.</p>
  <p>Lares, twenty-some miles inland, was younger &mdash; founded in 1827, just a year or so before Martín Arocho y Román was born there. It grew up almost entirely around one crop: coffee, introduced to the island in 1736 and, by the mid-1800s, its most valuable export. The mountainous terrain around Lares was made for it.</p>
  <div class="who">This page describes the towns, not this specific family &mdash; no record yet connects Máximo or Ramona to a particular farm, plantation, or event. It's the world they were born into, as best as public history can reconstruct it.</div>`},

{doc:"Añasco & Lares", html:`
  <span class="eyebrow">The 1820s &ndash; 1890s</span>
  <h1>A family in the hills of the west.</h1>
  <p class="lead">The oldest names we can confirm belong to farming families around Añasco and Lares, in the mountainous western interior of Puerto Rico.</p>
  <p><strong>Máximo Arocho</strong> and <strong>María Ramona Román</strong> were both born in Añasco. Neither their exact birth years nor their own parents have surfaced in any record found so far &mdash; they are, for now, the edge of what can be proven on this branch.</p>
  <p>Their son, <strong>Martín Arocho y Román</strong>, was born around <span class="dates">1828</span>, in a town not yet a year old. He married twice: first to <strong>María Josefa Pérez</strong>, with six children whose names were already forgotten by the time of his death in 1910 &mdash; and second to <strong>Felipa Medina</strong>, with whom he raised at least eleven more children in Lares, among them a son named Guillermo.</p>
  <p>By the 1860s, Lares had grown into exactly the kind of coffee town its founding promised &mdash; and exactly the kind of place where the island's deepest tensions came to a head. On the night of 23 September 1868, a group of planters and reformers marched into Lares and declared Puerto Rico's independence from Spain: the <strong>Grito de Lares</strong>. Spanish troops crushed it within a day. Martín would have been about forty years old, likely still living in or near the town where it happened &mdash; though no record places him at the event itself, and this book doesn't claim one where none exists.</p>
  <p>On the other side of the family, in the same decades, <strong>Juan Rosa Núñez y Bosque</strong> (b. 1858) and <strong>Juana Francisca Méndez Núñez</strong> (b. 1865) were raising their own family, which would eventually connect to Guillermo's line through marriage.</p>
  <div class="who">Family facts confirmed via FamilySearch civil registration &amp; parish records; Martín's own 1910 death certificate was located and read in full. Town history from public sources, cited at the end of this book.</div>`},

{doc:"Isidro and Agustina, Before the Records Begin", html:`
  <span class="eyebrow">Moca, Puerto Rico &middot; around 1780</span>
  <h1>Two names an algorithm guessed right, and a death record that proved it.</h1>
  <p class="lead">Alberto Núñez Acevedo lived a full life in Puerto Rico's western hills &mdash; born around 1805 in Moca, dead 90 years later in Bucarabones, Maricao. For most of this project his own parents existed only as a "Potential" tag: a guess, not a fact, exactly the kind of thing this book has refused to print without a document behind it.</p>
  <p>The document turned up in his own death record. It names his father, <strong>Isidro Núñez</strong>, and his mother, <strong>Agustina Acevedo</strong> &mdash; both born around 1780 in Moca, both now confirmed rather than suggested. They are Omar's <strong>6th great-grandparents</strong>, further back than almost anyone else on this side of the family, and they lived their whole lives as Spanish colonial subjects, decades before Puerto Rico's civil registration system even existed to record people like them directly.</p>
  <p>Isidro and Agustina are still just two names and a birth decade &mdash; no death dates, no siblings found yet, no record of their own parents. But they're real now, not guessed, which is the only thing this book has ever asked of anyone in it.</p>
  <p class="lead">Moca in 1780 was barely a town at all &mdash; founded only decades earlier, still mostly forest and scattered subsistence farms in Puerto Rico's northwest hill country, a full day's ride from the port at Aguadilla. Spain governed the island as a military and religious outpost more than a colony worth developing; there was no real cash economy here yet, no roads to speak of, and the Church's parish register was the only institution that reliably wrote anyone's name down. Sugar and coffee hadn't yet reshaped the island's economy the way they would a century later &mdash; that transformation, and the roads, plazas, and town squares that came with it, was still two generations away. Isidro and Agustina almost certainly lived and died within a few miles of where they were born, farming small plots of yuca, plantain, and coffee's predecessor crops for their own table rather than for export.</p>
  <div class="who">Death record: Puerto Rico, Civil Registrations, 1885-2001, Alberto Núñez Acevedo, 13 March 1895, Bucarabones, Maricao, Puerto Rico. Historical background on colonial-era Moca is public history, not a specific record of this family.</div>`},

{doc:"A Flag Changes, a Storm Arrives", html:`
  <span class="eyebrow">1898 &ndash; 1899 &middot; setting the scene</span>
  <h1>The island changed twice in one year.</h1>
  <p class="lead">Martín Arocho y Román was about seventy years old when the country he'd lived his whole life in changed flags &mdash; and then very nearly washed away.</p>
  <p>In 1898, following the Spanish&ndash;American War, the United States took control of Puerto Rico from Spain. The following August, the <strong>San Ciriaco hurricane</strong> struck &mdash; it rained for twenty-eight days, roughly 3,400 people died, and the coffee crop that towns like Lares depended on was almost entirely destroyed. It remains one of the deadliest storms in the island's history.</p>
  <p>Guillermo Arocho Medina was born a few years after, into a Puerto Rico still recovering from that storm and newly under American rule &mdash; a very different island than the one his father Martín had been born into in 1828.</p>
  <p>A decade later, the 1910 U.S. Federal Census caught the family at home in barrio La Torre, Lares: Martín, eighty-two, listed as <strong>agricultor</strong> &mdash; a farmer, still working the land at that age &mdash; head of a fifteen-person household that included his much-younger second wife Felipa and children ranging from grown daughters down to a nine-year-old. Felipa and the daughters are recorded as keeping house (<em>quehaceres de casa</em>). It's the only document in this whole book that says, in so many words, what Martín actually did for a living.</p>
  <img class="doc-photo" src="img/martin_arocho_1910_census.jpg" alt="1910 US Federal Census page for Martín Arocho y Román's household, La Torre, Lares, Puerto Rico">
  <div class="doc-photo-cap">1910 U.S. Census, barrio La Torre, Lares, PR</div>
  <div class="who">Historical backdrop, not a specific family record. No document yet found describes how this family weathered the hurricane or the change in government &mdash; only that they were there for both. The 1910 census household detail is a real, cited record: Puerto Rico, Lares, La Torre, District 0381, Sheet 2b.</div>`},

{doc:"A Death in Lares, 1910", html:`
  <span class="eyebrow">10 October 1910 &middot; Lares, Puerto Rico</span>
  <h1>What a death certificate remembered.</h1>
  <p class="lead">Martín Arocho y Román died at eighty-two, and the clerk who recorded it wrote down more than a date.</p>
  <p>The <em>Acta de Defunción</em>, entry number 328, names his parents &mdash; Máximo Arocho and Ramona Román, both "natural de Añasco." It records that he was first married to María Josefa Pérez, with six children whose names the informant could no longer recall. And it names his second wife, Felipa Medina, and the children they raised together: Gregoria, Eusebio, and several more, among them Guillermo.</p>
  <img class="doc-photo" src="img/martin_arocho_death_cert-1.jpg" alt="1910 Acta de Defunción for Martín Arocho y Román, Lares, Puerto Rico">
  <div class="doc-photo-cap">Acta de Defunción, entry 328, Lares, PR &middot; 10 Oct 1910</div>
  <div class="callout"><p>This single document, downloaded and read a century later, is the reason this book knows Martín had a first marriage at all &mdash; a fact that had disappeared from every other record and from family memory.</p></div>
  <p>It is a small thing, an old man's death recorded by a village clerk. It is also the reason any of the rest of this book can be written.</p>`},

{doc:"Guillermo & María", html:`
  <span class="eyebrow">10 December 1916 &middot; Lares, Puerto Rico</span>
  <h1>A wedding, and the family it began.</h1>
  <p class="lead">Guillermo Arocho Medina married María Hernández y Núñez in Lares, in the winter of 1916.</p>
  <p>He was Martín and Felipa's son. She was the daughter of <strong>Manuel Hernández</strong> and <strong>Ricarda Núñez y Méndez</strong> &mdash; María's own mother had already lived through one marriage and would go on to a second, to Ramón Torres Martínez, adding eight more children to the family tree that would one day lead to Omar.</p>
  <p>Guillermo and María's marriage record lists him at twenty-two and her at twenty-one &mdash; ages that suggest birth years a few years earlier than the official records elsewhere carry for both of them. It is a small discrepancy, the kind that turns up constantly in century-old paperwork, and this book leaves it unresolved rather than picking a winner.</p>
  <img class="doc-photo" src="img/guillermo_maria_marriage_cert-1.jpg" alt="1916 marriage certificate for Guillermo Arocho Medina and María Hernández y Núñez, Lares, Puerto Rico">
  <div class="doc-photo-cap">Marriage certificate, Lares, PR &middot; 10 Dec 1916</div>
  <p>By 1950, the U.S. Census found Guillermo in Arecibo's La Cruz neighborhood, on Calle Alejandro Salierup &mdash; and not farming, unlike his father before him. He was listed as a <strong>comerciante</strong>, a merchant, running his own small retail store (<em>tienda al detalle</em>), self-employed, fifty-two weeks a year. A generation had turned a farming family into a shopkeeping one.</p>
  <img class="doc-photo" src="img/guillermo_arocho_1950_census.jpg" alt="1950 US Federal Census page for Guillermo Arocho Medina's household, La Cruz, Arecibo, Puerto Rico">
  <div class="doc-photo-cap">1950 U.S. Census, La Cruz, Arecibo, PR</div>
  <p>Together they raised a family in Arecibo: five children lived long enough to be recorded, though two &mdash; Juan Salvador and Roberto &mdash; died in infancy. The rest were José María, Rosa María, and a daughter born the day before Christmas, 1923: <strong>Milagros</strong>.</p>
  <p class="lead">Lares in December 1916 would have been cool by island standards &mdash; the mountain interior runs several degrees cooler than the coast, with December among the driest, mildest months of the year, coffee-picking season in full swing across the hillsides around town. A wedding then meant timing it around the harvest as much as around the calendar: coffee was still the region's lifeblood, hand-picked by whole families including children, dried in the sun on wooden platforms called <em>tendales</em> outside nearly every home. Puerto Rico had been under U.S. rule for eighteen years by then, but daily life in a town like Lares &mdash; the language, the Catholic parish at its center, the rhythm of planting and harvest &mdash; had changed far less than the flag over the town hall.</p>
  <div class="who">Guillermo died 13 Nov 1967; María died 10 Apr 1956, Arecibo, buried the next day. Both names are on the Arecibo headstone that started this whole search. Historical/seasonal background on Lares is public history, not a specific record of this wedding.</div>`},

{doc:"Milagros", html:`
  <span class="eyebrow">20 December 1923 &middot; Arecibo, Puerto Rico</span>
  <h1>Milagros is born.</h1>
  <p class="lead">She would live seventy-two years, marry, raise a family in Arecibo, and be buried in the same cemetery her parents already occupied.</p>
  <p>Her sister <strong>Rosa María</strong> married a man named Víctor Cruz and had eight children of her own &mdash; the Cruz cousins, a whole branch of the family that grew up alongside Milagros's own children. Her brothers José María and, briefly, Juan Salvador and Roberto rounded out the household, though the two youngest never made it past infancy, a loss common enough in that era to barely register in the official record beyond a name and two dates a year apart.</p>
  <p>On Christmas Eve, 1942 &mdash; Milagros married. Her husband's name was <strong>Amado Marrero Montalvo</strong>, and his own family had roots in a different part of the island, but a story just as documented as hers.</p>
  <p class="lead">Milagros grew up in an Arecibo remaking itself. The 1920s and '30s brought electricity and paved streets to the town center for the first time, even as the Great Depression hit the island's sugar and coffee economies hard &mdash; Puerto Rico's per-capita income was among the lowest under the American flag through her whole childhood. World War II reshaped everything again just as she came of age: Arecibo's coast became part of the island's coastal defense network, young men left for the war, and rationing touched even food staples like rice and codfish that had defined Puerto Rican tables for generations. Her Christmas Eve wedding in 1942 fell in the middle of that wartime year &mdash; <em>Nochebuena</em> itself, already the biggest night of the Puerto Rican calendar, roast pork and pasteles and parrandas going house to house, made a wedding day that needed no separate celebration built around it.</p>`},

{doc:"The Marrero–Montalvo Line", html:`
  <span class="eyebrow">In parallel, the 1850s &ndash; 1920s</span>
  <h1>Amado's family, growing at the same time.</h1>
  <p class="lead">While Guillermo and María's family took shape in Lares and Arecibo, Amado's parents were building a life of their own.</p>
  <p><strong>Juan Ramón Marrero</strong> (b. 1883) married <strong>María Montalvo Ramos</strong> (b. 15 Jun 1896, Utuado) in Arecibo, 1920. Juan Ramón's own parents, <strong>Pedro Marrero Nieves</strong> and <strong>Celestina González Soto</strong>, both died in 1895 &mdash; the same year, for reasons the records don't explain. María's parents, <strong>Domingo Aquilino Montalvo Dominguez</strong> (b. 17 Nov 1878, Sabana Hoyos, Arecibo &mdash; d. Oct 1970, Miraflores, Arecibo) and <strong>Dionicia Ramos Santiago</strong> (b. 11 Apr 1876 &mdash; d. 29 Apr 1972, both Sabana Hoyos/Miraflores, Arecibo), married in Arecibo on 22 March 1901 and went on to raise nine children of their own. María herself is the best-documented person in this entire tree &mdash; five census records spanning 1910 to 1950, a death record, and a 1928 passenger list naming the ship she sailed on, the <em>Coamo</em>.</p>
  <p>Amado was born 11 May 1924, in Arecibo &mdash; the same city where, eighteen years later, he would marry Milagros.</p>
  <div class="who">This side of the family extends one generation further back than confirmed on the Arocho/Hernández side: to Amado's great-grandparents, Pedro Marrero Nieves, Celestina González Soto, Domingo Aquilino Montalvo Dominguez, and Dionicia Ramos Santiago &mdash; the last two confirmed by eleven and ten independent Ancestry records respectively.</div>`},

{doc:"Reading the Old Handwriting", html:`
  <span class="eyebrow">Arecibo, 1819 &ndash; 1892</span>
  <h1>Two more generations, found in a book that hasn't been opened in over a century.</h1>
  <p class="lead">The Montalvo line goes back further than anyone realized &mdash; and the proof was sitting in a leather-bound death register in Arecibo, in Spanish, in handwriting no algorithm was ever going to transcribe correctly on its own.</p>
  <p>Domingo Aquilino Montalvo Dominguez's own father, <strong>Hilario Montalvo y Centeno</strong> (1850&ndash;1900), turned out to have a death record of his own &mdash; and it named <em>his</em> parents: <strong>Nicolás Montalvo Núñez</strong> (b. abt 1819, Arecibo &ndash; d. 13 Jan 1892, barrio Sabana, Arecibo, of pneumonia, age 73) and <strong>Tomasa Centeno</strong>. That's Amado's 5th-great-grandfather, born back when Puerto Rico was still under Spanish colonial rule.</p>
  <p>Reading Nicolás's own death certificate directly &mdash; not a transcription, the actual 1892 handwritten Spanish &mdash; turned up something nobody had recorded anywhere: Nicolás had been married <em>twice</em>. Tomasa Centeno was his first wife; they had two children, Hilario and a previously unknown sister, <strong>Catalina</strong>. After Tomasa, he remarried <strong>Higinia Rodríguez</strong> and had eight more children &mdash; half-siblings to Hilario, born into a branch of the family nobody had traced before: María Justa, Romualdo, Juliana, Francisco, Juan José, Concepción, Juan, and Francisca.</p>
  <p>A second, completely independent record &mdash; the 1885&ndash;87 death certificate of a man named <strong>Juan Tomás Montalvo Núñez</strong>, found by searching Arecibo's records directly rather than waiting on a hint &mdash; turned out to name the same parents again: a man named <strong>Valentín Montalvo</strong> and a woman named <strong>Juliana Núñez</strong>. That's Nicolás's own father and mother, confirmed twice over by two unrelated documents about two different sons. Juan Tomás, unmarried, a day laborer, died of asphyxia in barrio Miraflores &mdash; another previously unknown brother of Nicolás, and one more branch of this family that had simply never been looked for before.</p>
  <div class="who">Nicolás Montalvo Núñez and Tomasa Centeno confirmed via Nicolás's own 1892 Arecibo death certificate, read directly from the original Spanish. Valentín Montalvo and Juliana Núñez (Amado's 6th-great-grandparents on the Montalvo side) confirmed independently by two separate death records: Nicolás's (1892) and his previously-undocumented brother Juan Tomás's (1885&ndash;87). Valentín's own parents are not yet found in any record &mdash; PR's civil registration only starts in 1836, so going further back will mean searching Arecibo's Catholic parish baptismal records instead. <strong>Unresolved discrepancy (2026-07-22):</strong> a separate 1887 birth registration for Hilario's son Juan Montalvo y Rodríguez names Hilario's parents as "Nicolás Montalvo" and "Encarnación Centeno" &mdash; same names as here except the wife's first name (Encarnación vs. Tomasa). Both records are real and both are cited; this book doesn't pick a winner. Possibly Nicolás had two wives named Centeno, or one record has a transcription error &mdash; needs the original parish/civil images compared side by side to resolve.</div>`},

{doc:"Thelma", html:`
  <span class="eyebrow">27 September 1943 &ndash; 14 September 2019</span>
  <h1>A daughter, and a family that would scatter.</h1>
  <p class="lead">Milagros and Amado's first surviving child was a daughter, Thelma, born in Arecibo. In 1950 she was six years old, living in her grandmother María Montalvo Ramos's household on Calle José Leonoron in the San Felipe barrio &mdash; the same address María herself is recorded at that year, three generations under one roof.</p>
  <p>Amado's own life did not stay in Puerto Rico. His marriage to Rosa Ceballo Marrero, in Manhattan in 1950, falls right at the start of what's remembered as the <strong>Great Migration</strong> &mdash; between 1950 and 1960, roughly 470,000 Puerto Ricans, a fifth of the island's population, left for the mainland, most of them for New York City. The 1917 Jones Act had already made every Puerto Rican a U.S. citizen, free to travel without a visa; postwar factory jobs and, by the 1950s, cheap air travel did the rest. By 1950, four out of five mainland Puerto Ricans lived in New York.</p>
  <p>Amado appears to have been part of that wave. By the time he died in 1982, it was in Oceanside, on Long Island, New York, far from the Arecibo he was born in. He is buried in Roosevelt, New York &mdash; one of hundreds of thousands of that same migration, most of whom never came home.</p>
  <p>Milagros stayed. She died in Arecibo in 1996, seventy-two years old, and was buried that August in Cementerio Privado La Santa Cruz &mdash; the same plot as her parents and her sister. It is the grave that started this entire search.</p>
  <p>Thelma's own life moved between three marriages and two countries. Her daughter, <strong>Yadyra Cardona</strong>, was born in 1959 to Thelma and <strong>Miguel Cardona</strong>. Later, Thelma married <strong>Richard Broadbent</strong>, with whom she had two more children, Eric and Paris &mdash; Yadyra's half-brothers. By the early 1980s Thelma had moved to El Paso, Texas, where on 21 September 1982 she married a third time, to <strong>Ruben Garcia</strong>. By the mid-1990s she had settled on Long Island &mdash; Freeport, then Bellmore, then Rockville Centre &mdash; where she lived until her death in Mineola in 2019, seventy-five years old.</p>
  <p class="lead">El Paso in the early 1980s was a border boomtown, its population climbing past 400,000 for the first time, Fort Bliss and a growing garment and electronics industry pulling people in from across Texas, Mexico, and beyond. It was a strange landing spot for a Puerto Rican family, an overwhelmingly Mexican-American city where the second language on every sign was the same Spanish Thelma had grown up speaking, just a different accent, a different history behind it. Summers there run brutally dry and over 100&deg;F, a world away from San Felipe's tropical humidity or the gray Atlantic winters she'd later settle into on Long Island &mdash; three marriages, three very different climates, one woman moving through all of them.</p>
  <div class="who">Amado's New York dates and burial place are confirmed on FamilySearch. Thelma's birth, 1950 census household, El Paso residence, and marriage to Ruben Garcia are confirmed by U.S. federal census records, Texas marriage indexes, and public records indexes. The Great Migration context is documented public history, not a specific record of why the family went &mdash; but the timing lines up with it closely. El Paso background is public history, not a specific record of Thelma's life there.</div>`},

{doc:"Yadyra & Juan José", html:`
  <span class="eyebrow">28 September 1946 &middot; Bogotá, Colombia</span>
  <h1>The man who would become your father.</h1>
  <p class="lead">Juan José Huertas Vargas was born in Bogotá, Cundinamarca, Colombia &mdash; not Puerto Rico. His is an entirely separate migration story, layered onto this one only by his marriage.</p>
  <p>His parents were <strong>Juan José Huertas</strong> and <strong>Beatriz Vargas y Rosa de Huertas</strong> (1922&ndash;2013). Beyond their names, almost nothing about that side of the family has surfaced yet &mdash; no birth, marriage, or Colombian civil record has been found for either of them, only the family-tree entries themselves. What is known about Juan José himself comes almost entirely from a single document: the service card printed for his funeral, on 27 November 2021, four days after he died at seventy-five in Florida.</p>
  <img class="doc-photo" src="img/juan_jose_huertas_funeral_card.jpg" alt="Funeral service card for Juan José Huertas Vargas, November 2021">
  <div class="doc-photo-cap">Funeral service card &middot; 27 Nov 2021, Florida</div>
  <p>He married Yadyra Cardona &mdash; Thelma's daughter, three generations removed from the wedding in Lares in 1916, four from the death certificate that first named Máximo Arocho. Yadyra's own father, <strong>Miguel Cardona</strong>, was the son of <strong>Miguel Cardona Reyes</strong> and <strong>Iraida Cruz Santiago</strong> &mdash; a line confirmed by the family directly rather than by document, and the shallowest-known branch of this entire tree.</p>
  <p class="lead">Bogotá in September 1946, at 8,600 feet in the Andes, would have greeted Juan José's birth with the same cool, thin, rainy-season air the city has year-round &mdash; no real seasons, just wet months and slightly-less-wet ones, and September sits deep in the second of the city's two rainy stretches. The Colombia he was born into was two years from <em>La Violencia</em>, the decade of political bloodshed between Liberals and Conservatives that would soon send hundreds of thousands of rural Colombians fleeing into cities like Bogotá; the capital itself was already swelling with migrants, its streetcars and tiled colonial center giving way, block by block, to the modern city growing around it.</p>
  <div class="who">Birthdate/birthplace and parents' names sourced from the Ancestry family tree, not yet an opened Colombian civil or church record &mdash; that search is still open. Everything else on this page comes from the funeral card and the family's own confirmation. Bogotá climate and historical background is public history, not a specific record of this birth.</div>
  <div class="callout"><p>Everything in this book, every record and every name, exists to answer one question: who were the people whose lives, one after another, led to this marriage &mdash; and to the child it produced.</p></div>`},

{doc:"The Oldest Name We Have", html:`
  <span class="eyebrow">Arecibo, 9 September 1894</span>
  <h1>A death certificate that reaches back before 1800.</h1>
  <p class="lead">On the Montalvo side of Amado's family, one more document pushed the line back further than anywhere else in this book &mdash; to a man who was likely born under Spanish colonial rule in the 1780s.</p>
  <p>María Rodríguez y Rodríguez &mdash; Hilario Montalvo y Centeno's wife &mdash; had her own parents named in a Puerto Rico civil death registration: <strong>Juan Antonio Rodríguez y Reyes</strong>, who died in Arecibo on 9 September 1894 at eighty-five years old, meaning he was born around 1809. His wife was <strong>Mercedes Rodríguez</strong>. The same document, naming Juan Antonio's own parents for the informant's record, gives us <strong>Valentín Rodríguez</strong> and <strong>Rosa Reyes</strong> &mdash; old enough, if Juan Antonio was born in 1809, to have themselves been born in the 1780s.</p>
  <p>No birth, marriage, or death record for Valentín or Rosa themselves has turned up. They exist in this book only as two names on their son's death certificate &mdash; but they are, for now, the oldest confirmed people in the entire family tree, a full generation earlier than Martín Arocho y Román's 1828 birth in Lares.</p>
  <div class="who">Juan Antonio Rodríguez y Reyes's death registration (Puerto Rico, Civil Registration, 1805-2002, FamilySearch ARK 1:1:QVJ3-7C3B) names both his wife and his own parents. Valentín Rodríguez and Rosa Reyes are named only on this one document; no independent second source has been found for them.</div>`},

{doc:"Bogotá, Behind the Funeral Card", html:`
  <span class="eyebrow">Bogotá, Colombia &middot; a separate world</span>
  <h1>What the Colombian records add to a nearly blank page.</h1>
  <p class="lead">Juan José Huertas Vargas's own side of the family had almost nothing behind it &mdash; until a search through Colombian civil and burial records turned up real documents, not just names on a family tree.</p>
  <p>His mother, <strong>Beatriz Vargas y Rosa de Huertas</strong>, appears on her own 1952 Colombian background-check card: born 12 September 1922 in Bogotá, married, parents <strong>Luciano Vargas</strong> and a mother recorded only by her surname, <strong>Pineda</strong>. No further record for either of them has surfaced &mdash; this is where that line currently ends.</p>
  <p>His father's own parents remain unconfirmed. A name search turned up a Bogotá couple, a Jose Manuel Huertas and a Clementina Castiblanco, real and documented in their own right &mdash; but no document has been found that actually names Juan José as their son, so this book doesn't claim them as his parents. That search continues.</p>
  <div class="who">Beatriz's parents: Colombia, DAS Civil Registration Alphabetic Cards, 1914-2011 (FamilySearch ARK 1:1:65W7-7BZF) &mdash; her own record names them directly, confirmed. Juan José's own father's parents are not yet established by any document that states the relationship directly, and are intentionally left out of this book's family line for that reason.</div>`},

{doc:"A Death Certificate Answers a Question", html:`
  <span class="eyebrow">Arecibo, 27 July 1942</span>
  <h1>The document that finally named Miguel Cardona Reyes's parents.</h1>
  <p class="lead">For most of this project, Miguel Cardona Reyes's parents existed only as an algorithm's guess &mdash; a "Potential father" and "Potential mother" tag that this book's own rule said not to trust. Then his death certificate turned up.</p>
  <p>Miguel died in Arecibo on 27 July 1942, at twenty-two. His <em>Certificado de Defunción</em> states plainly, in the clerk's own hand: father <strong>Ramón Cardona</strong>, mother <strong>Catalina Reyes</strong>. No guessing, no matching software, no stranger's tree &mdash; the record itself names them, which is exactly what this project has insisted on from the start.</p>
  <p>It didn't stand alone. A 1930 census had already shown a ten-year-old "Miguel Colón y Reyes" living in a household headed by Catalina Reyes y Rivera, alongside siblings Tomás, Cándido, Daniela, and Francisca &mdash; recorded under a different surname than the one Miguel used later, which had been reason enough to hold off. His World War II draft card, filled out five months before he died, closed that gap: it lists his next of kin as "Tomás Colín" &mdash; the same brother, now on paper, tying the Colón household directly to the Cardona name Miguel carried as an adult.</p>
  <p>Between one death certificate and one draft card, a line that had been stuck for the whole project became four generations deep: <strong>Ramón Cardona Estela</strong> and <strong>Catalina Reyes Rivera</strong>, parents of <strong>Miguel Cardona Reyes</strong> (1920&ndash;1942), father of <strong>Miguel Cardona</strong> &mdash; Yadyra's father, and Omar's grandfather.</p>
  <p class="lead">Miguel filled out that draft card in February 1942, two months after Pearl Harbor, when every Puerto Rican man of age was suddenly registering for a war the island had no say in joining. He was dead by July, at twenty-two &mdash; the record doesn't say why, and this book won't guess, but it's worth naming the odds of the era: penicillin wasn't yet available to civilians anywhere in the U.S. or its territories in 1942, and a bad infection, a burst appendix, or tuberculosis &mdash; still a leading killer on the island through the 1940s &mdash; could take a healthy young man in days. Arecibo that July would have been deep in hurricane season, humid and close, the war a distant radio broadcast rather than a battlefield, but no less real for the young men registering for it.</p>
  <div class="who">Death record: Puerto Rico, Civil Registrations, 1885-2001, Arecibo Defunciones 1941-1943. Household: 1930 & 1935 U.S./Puerto Rico census schedules. Draft card: U.S., World War II Draft Cards Young Men, 1940-1947. Background on 1942 conditions is public history, not a specific record of Miguel's cause of death, which remains unknown.</div>`},

{doc:"Iraida's Papers", html:`
  <span class="eyebrow">Arecibo to Brooklyn to Hart Island</span>
  <h1>A life traced through the paperwork of being an immigrant.</h1>
  <p class="lead">Yadyra's grandmother on the Cardona side, Iraida Cruz Santiago, left behind more paper than almost anyone else on this side of the family &mdash; not because her life was unusually documented, but because she lived it entirely inside the American paperwork system: Social Security, passenger lists, public records indexes.</p>
  <p>Her own birth record, an <em>Acta de Nacimiento</em> from Arecibo dated 20 November 1925, names her mother, Dolores Santiago, and no father at all &mdash; the space on the document simply wasn't filled in. Her Social Security application, filed decades later and updated as her name changed over the years (Cruz Marin, then just Marin), names a father: <strong>Eleuterio Cruz</strong>. It's self-reported, not a birth record, but it's the strongest evidence yet for a name that had only existed before as an algorithm's guess.</p>
  <p>Dolores herself shows up five years later, in the 1930 census: about twenty-eight years old, still in Arecibo, living on her own rather than as an entry on someone else's page. It's a small thing &mdash; one line in a census taker's book &mdash; but it's the first record of Dolores as a person in her own right, not just "mother" on her daughter's paperwork.</p>
  <p>A different, unrelated stranger's public tree claims her father was someone else entirely &mdash; Juan B. Colón Pérez. Both claims are recorded here. Neither is resolved.</p>
  <p>Iraida died in New York in October 1998 and was buried on <strong>Hart Island</strong>, in the Bronx &mdash; New York City's public cemetery, still in use today for residents who die without family able to claim them or pay for a burial. It is a detail no one in the family had known, and one that says something true and a little heartbreaking about how far from Arecibo her life had carried her by the end.</p>
  <p class="lead">Whenever Iraida made the move north, she joined one of the largest population shifts in Puerto Rican history &mdash; hundreds of thousands crossing from the island to New York across the middle of the twentieth century, most landing first in neighborhoods like the Lower East Side, the South Bronx, or Brooklyn's Williamsburg and Bushwick, where Spanish-language churches, bodegas, and social clubs sprang up to hold pieces of the island in place. It was a harder landing than the postcards suggested: cold winters none of these families had ever prepared for, factory and garment-district jobs that paid poorly and demanded long hours, and a city that didn't always distinguish between Puerto Rican citizens and other, less-welcomed immigrants. Hart Island itself has held New York's unclaimed dead since 1869 &mdash; prisoners from Rikers used to dig the graves, and burials there happen in unmarked trenches, a hundred or more to a section. It is the ending of an old, particular kind of American story: someone who came for opportunity and, in the end, had no one nearby to claim her.</p>
  <div class="who">Birth record: Puerto Rico, Civil Registrations, 1885-2001. Social Security application: U.S., Social Security Applications and Claims Index, 1936-2007 (SSN 582808084). Burial place: U.S., Find a Grave Index. The competing "Juan B. Colón Pérez" father claim comes from an unrelated public Ancestry tree with no attached document &mdash; noted, not accepted. Background on Puerto Rican migration to New York and Hart Island is public history, not a specific record of Iraida's own life.</div>`},

{doc:"A Marriage Record Opens Two More Generations", html:`
  <span class="eyebrow">Arecibo, 30 September 1913</span>
  <h1>The wedding record that named Eleuterio's parents &mdash; and his mother's parents, too.</h1>
  <p class="lead">Eleuterio Cruz y Olivo &mdash; father of Iraida, great-great-grandfather of Omar &mdash; had two "Potential" parent tags sitting on his profile for most of this project: names an algorithm guessed, that this book's rule said not to trust without a document. His 1913 marriage record turned out to be that document.</p>
  <img class="doc-photo" src="img/eleuterio_cruz_marriage_1913.jpg" alt="1913 Acta de Matrimonio for Eleuterio Cruz Olivo and Nicolasa Santiago, Arecibo, Puerto Rico">
  <p>On 30 September 1913 in Arecibo, twenty-five-year-old Eleuterio Cruz Olivo married Nicolasa Santiago &mdash; a first marriage, years before the Dolores Santiago the family already knew about, and a real, separate fact rather than a duplicate. The record names his parents plainly: father <strong>Bartolo Cruz</strong>, mother <strong>Juana Olivo</strong>. That was enough to convert two guesses into two confirmed great-great-great-grandparents: <strong>Bartolome Cruz Munoz</strong> (1850&ndash;1914) and <strong>Juana Olivo Y Cabrera</strong> (abt. 1852&ndash;1925).</p>
  <p>Juana's own death record went a generation further. She died in Hatillo on 27 September 1925, and her <em>Certificado de Defunción</em> names her parents too: <strong>Miguel Olivo</strong> and <strong>Polonia Cabrera Y Rosario</strong>. Two more Potential tags, sitting untouched on Ancestry from a stranger's tree, confirmed by Juana's own paperwork the same way Miguel Cardona Reyes's parents were confirmed a few pages back &mdash; not by matching software, but by a document that says so.</p>
  <img class="doc-photo" src="img/juana_olivo_death_cert_1925.jpg" alt="1925 Certificado de Defunción for Juana Olivo Cabrera, Hatillo, Puerto Rico">
  <p>Bartolome's own paperwork added something no one had asked for: siblings. A 1910 census listed a child, Vierze, not yet in the tree. A Social Security record named another, Secundino. And what looked like Bartolome's own death record turned out, on closer reading, to actually be his daughter <strong>Mercedes Cruz Olivo's</strong> 1944 death certificate from Aguadilla &mdash; naming Bartolomé Cruz and Juana Olivo as her parents, a second document confirming the same couple from a completely different angle, thirty years after Bartolome himself had died.</p>
  <img class="doc-photo" src="img/mercedes_cruz_olivo_death_cert_1944.jpg" alt="1944 death certificate for Mercedes Cruz Olivo, Aguadilla, Puerto Rico">
  <p>One marriage record and two death certificates took a line that had been frozen at "Potential" for the whole project and pushed it back two full generations: <strong>Miguel Olivo</strong> and <strong>Polonia Cabrera Y Rosario</strong>, parents of <strong>Juana Olivo Y Cabrera</strong>, who with <strong>Bartolome Cruz Munoz</strong> raised <strong>Eleuterio Cruz y Olivo</strong> (1887&ndash;1936) &mdash; father of Iraida, and the man whose own paperwork keeps quietly rewriting how far back this side of the family can be proven.</p>
  <p class="lead">Arecibo in September 1913 was a working port town on Puerto Rico's north coast, its harbor built for shipping the region's sugar and its river, the Río Grande de Arecibo, cutting the town in two. A wedding like Eleuterio and Nicolasa's would have happened at the parish or the town's civil registry office, likely followed by nothing grander than a family meal &mdash; formal wedding photography and receptions were still a luxury reserved for the town's wealthier families. Fifteen years into American rule, Arecibo's daily rhythms were still set by the sugar harvest and the Catholic calendar; English existed mainly on official paperwork and in the new public schools, not yet in the street.</p>
  <div class="who">Marriage record: Puerto Rico, Civil Registrations, 1885-2001, Arecibo Matrimonios 1909-1922. Death records: Puerto Rico, Civil Registrations, 1885-2001 (Juana Olivo Cabrera, Hatillo Defunciones 1925; Mercedes Cruz Olivo, Aguadilla Defunciones 1942-1946). Census and Social Security records corroborate residence and additional children. Arecibo background is public history, not a specific record of this wedding.</div>`},

{doc:"Domingo's Eight", html:`
  <span class="eyebrow">Sabana Hoyos, Arecibo</span>
  <h1>Eight children, two grandchildren the family never met.</h1>
  <p class="lead">Domingo Aquilino Montalvo Dominguez (1878&ndash;1970) and Dionicia Ramos Santiago (1876&ndash;1972), married 22 March 1901 in Arecibo, raised eight children in Sabana Hoyos. One of them, María Montalvo Ramos, is Amado Marrero Montalvo's mother &mdash; Omar's great-great-grandmother. The other seven are her siblings, Amado's aunts and uncles, mostly forgotten until this project went looking.</p>
  <p>Four of the eight are dead ends online &mdash; Andrea, Hilario, Manola, and Cándida either had no children or none recorded. But two branches opened wide. <strong>Granelio Montalvo</strong> and Carmen González Serrano had five children who mostly lived into the 2000s: Domingo, Pedro (1929&ndash;2010), Carmen María (1932&ndash;2007), Matilde, and Damián (1935&ndash;2008). <strong>Gertrudis Montalvo y Ramos</strong> and Concepción Montalvo Vázquez had five more: Josefa, Inocencio, Lydia, Blanca, and Santos.</p>
  <p>Three of Granelio's children lived recently enough &mdash; into 2007, 2008, 2010 &mdash; that they plausibly have living children and grandchildren walking around today, distant cousins of Omar's who have never heard this name. Checking each of the ten individually turned up nothing further online: no spouses, no children recorded, even for the ones who lived into their eighties. Damián had a documented partner, Elena Cruz Díaz, but no children listed. It's not that the line ended &mdash; it's that the paper trail runs out exactly where digitized records stop being free, which is usually somewhere in the 1960s onward.</p>
  <p class="lead">Sabana Hoyos in the early 1900s was one of Arecibo's rural barrios &mdash; scattered farmhouses along dirt roads climbing into the limestone hills north of the karst country, no real town center, just a school, a chapel, and small landholdings growing tobacco and provision crops alongside a little coffee. Eight children was not unusual for a family like Domingo and Dionicia's; large families were both an economic necessity, more hands for the harvest, and a hedge against the era's infant and childhood mortality, which the four dead-end lines in this chapter quietly illustrate. By the time Granelio and Gertrudis's own children were growing up mid-century, Puerto Rico's Operation Bootstrap was pulling the island's economy from agriculture toward manufacturing &mdash; the reason so many of this generation's records simply stop, scattered to factory jobs on the mainland instead of staying put to be found by a search decades later.</p>
  <div class="who">FamilySearch Family tab, Domingo Aquilino Montalvo Dominguez (PID L6RL-N7P) and Dionicia Ramos Santiago De Montalvo (PID GPY9-MKX), checked sibling-by-sibling, 2026-07-22. Background on Sabana Hoyos and Operation Bootstrap is public history, not a specific family record.</div>`},

{doc:"Amado's Own Siblings", html:`
  <span class="eyebrow">The Marrero-Montalvo household</span>
  <h1>Two brothers and a sister who stayed close to home, and one who married out.</h1>
  <p class="lead">Amado Marrero Montalvo &mdash; Thelma's father, Omar's great-grandfather &mdash; was one of several children of Juan Ramón Marrero and María Montalvo Ramos. His siblings didn't get their own page until now.</p>
  <p><strong>Robert Marrero Montalvo</strong> (1925&ndash;deceased) left no spouse or children on record &mdash; a dead end online, though not necessarily in life. <strong>Julia Marrero Montalvo</strong> (1927&ndash;2012) did better: she married <strong>Héctor Manuel González Lago</strong> (1922&ndash;2003), a real, documented union that gives Amado's line a whole additional branch of in-laws most of the family never tracked.</p>
  <p>A stranger's public tree also listed a "Robert Marrero" and "Roberto Marrero" as if they were two separate people in this same generation &mdash; almost certainly the same Robert Marrero Montalvo already confirmed here, just recorded twice under a name variant. Flagged as a likely data-quality issue in someone else's tree, not treated as two new people.</p>
  <div class="who">FamilySearch Family tab for Juan Ramón Marrero and María Montalvo Ramos's children, cross-checked against a public Ancestry tree, 2026-07-22.</div>`},

{doc:"Milagros's Brothers and Sisters", html:`
  <span class="eyebrow">La Cruz, Arecibo</span>
  <h1>Six siblings, three of whom didn't survive childhood.</h1>
  <p class="lead">Milagros wasn't an only child. Guillermo Arocho Medina and María Hernández y Núñez had at least six children, and their records &mdash; scattered across FamilySearch, a cemetery in Arecibo, and one marriage certificate &mdash; tell a story that was ordinary for the place and time: half the children didn't live to grow up.</p>
  <p><strong>Juan Salvador</strong> died in 1919, the same year he was born. <strong>Roberto</strong> died in 1925, also an infant. <strong>José María</strong> (b. 1921) has no death date on record at all &mdash; he'd be 104 today, so the silence almost certainly means he died at some point with no one updating the record, not that he's still alive.</p>
  <p>One sister made it further than the rest. <strong>Rosa María Arocho Hernández</strong> (abt. 1920 &ndash; 30 March 1979) is buried next to Milagros and Guillermo themselves at Cementerio La Santa Cruz in Arecibo &mdash; the headstones match photos already in this project's records. She married Víctor Cruz Feliciano on 25 August 1943 and had four children of her own: two who died in infancy, and two &mdash; Orlando (1947&ndash;2000) and Miryam (1954&ndash;1998) &mdash; who lived full adult lives with no marriage or children found for either yet. They are real, documented people, Omar's first cousins twice removed, and the strongest open lead in this whole branch: if either left descendants, they are living relatives nobody in this family has met.</p>
  <div class="who">FamilySearch Family tab for Guillermo Arocho Medina and María Hernández y Núñez's children (PIDs 2W7N-XJS, KP7P-3DQ, 2W7N-X2P, L7FP-L53), cross-checked against headstone photos at Cementerio La Santa Cruz, Arecibo, 2026-07-22.</div>`},

{doc:"Guillermo's Twelve", html:`
  <span class="eyebrow">La Torre, Lares</span>
  <h1>Martín Arocho's second marriage, and the dozen children it produced.</h1>
  <p class="lead">Martín Arocho y Román married twice. His first wife, María Josefa Pérez, gave him six children whose names the informant on his own death certificate simply didn't know &mdash; "cuyos nombres ignora el declarante," the clerk wrote, a small, honest admission that some names are gone for good. His second wife, Felipa Delores Medina y Caos, is the one this family descends from.</p>
  <p>Martín and Felipa raised twelve children in La Torre, Lares. Guillermo &mdash; Milagros's father, Omar's great-great-grandfather &mdash; was one of them. His siblings, confirmed on FamilySearch with real sourcing: <strong>Gregoria, Eusebio, José</strong> (1888&ndash;1940), <strong>Salome</strong> (1888&ndash;1964), <strong>Juan Rosendo</strong> (1893&ndash;1966), <strong>Anselma</strong> (1894&ndash;1939), <strong>Alejandra</strong> (1896&ndash;), and several more whose names blur at the edge of the handwriting on the original document.</p>
  <p>Most of the twelve are still just names and dates &mdash; siblings confirmed, but not yet followed forward into their own marriages and children. One of them, though, turned out to have a branch of his own worth an entire page: Eusebio.</p>
  <div class="who">Martín Arocho y Román's death certificate, 1910, Lares, Puerto Rico (records/familysearch-documents/martin_arocho_y_roman_death_cert_1910.pdf); FamilySearch Family tab for Martín Arocho y Román + Felipa Delores Medina y Caos.</div>`},

{doc:"Eusebio's Ten", html:`
  <span class="eyebrow">1906, Lares</span>
  <h1>The uncle who quietly had the biggest family of all.</h1>
  <p class="lead">Eusebio Arocho Medina (1888&ndash;1974) &mdash; Guillermo's brother, Omar's great-great-granduncle &mdash; married Juana Vélez Lugo on 3 December 1906. FamilySearch backs him with 17 sources, more documentation than most of this side of the family has for any single person. Between them, Eusebio and Juana had ten children.</p>
  <p>Manuel (1907&ndash;1950), Eusebio Jr. (b. 1910), Carla (1911&ndash;1937), Carlos (b. 1911), Eusebia (b. 1915), José (b. 1916), Rosario (b. 1919), Sara (1920&ndash;1947), Leocadia (b. 1921), and a tenth whose record is still uncaptured &mdash; ten Arocho y Vélez cousins, Omar's first cousins three times removed, spread across two decades of births in Lares. Three of the ten &mdash; Carla, Sara, and presumably others &mdash; didn't live past their twenties or thirties; the ones who survived longer haven't yet been checked for marriages or children of their own.</p>
  <p>This branch is fully documented but entirely unbuilt &mdash; real FamilySearch entries, real IDs, ready to pull from directly, just never entered into the living Ancestry tree. Given the volume across all twelve of Guillermo's siblings, doing this properly for everyone could easily add fifty more names to the family. It's pure data entry at this point, not research: the hard part, finding them, is already done.</p>
  <div class="who">FamilySearch Family tab for Eusebio Arocho Medina (PID GMR6-424) and Juana Vélez Lugo, 2026-07-22.</div>`},

{doc:"The Living Branches", html:`
  <span class="eyebrow">2026</span>
  <h1>Not every page in this book is about the dead.</h1>
  <p class="lead">Most of this project has been about proving who came before. This page is about who's still here &mdash; the aunts, uncles, and cousins Omar carries in memory, not in a document, and a mistake in the tree itself that quietly turned an uncle into a stepfather.</p>
  <p>Omar's father, Juan José Huertas Vargas, had children with several women over his life. Alongside Yadyra's own two &mdash; Omar and his brother <strong>Elkyn</strong> &mdash; Omar named the rest directly: <strong>Luica</strong> (whose son is Juan Carlos), <strong>William</strong>, <strong>Melba</strong> (mother of David, Marcella, and Lissete, who passed around 1999 or 2000), <strong>Iris</strong> (mother of Juan Jose, Manuel, Bridget, Irus, and Breanna), and <strong>Angelica</strong> (mother of Catila, Sabashian, and Nicholus). None of this lives in any government record &mdash; it lives in Omar's own memory, and that's exactly what this project has always counted as fact when it comes to immediate family.</p>
  <p>Omar's grandmother Beatriz had children too, beyond Juan José: <strong>Pablo, Hector, Guillermo, Manuel,</strong> and <strong>Chella</strong> &mdash; Omar's own uncles and aunt, named the same way, from memory rather than paper.</p>
  <p>And one correction: Ancestry's own automatic matching had, at some point, linked <strong>Angel A. Marrero</strong> as Yadyra's spouse instead of her uncle &mdash; which made him show up as Omar's stepfather, and made Omar and Elkyn look like his own children. Omar caught it immediately: "he's still my great uncle." Angel is Thelma Marrero's brother, son of Amado Marrero Montalvo and Rosa Ceballo &mdash; Yadyra's uncle, and Omar's great-uncle, exactly as it should have read from the start.</p>
  <div class="who">Names and relationships in this chapter are family-told by Omar Huertas, per this project's standing rule that direct testimony about immediate and near family counts as fact without requiring an outside document.</div>`},

{doc:"The Day They Got to Me", html:`
  <span class="eyebrow">1978</span>
  <h1>Omar.</h1>
  <p class="lead">Two centuries of farmers, clerks, witnesses, and the people who married them &mdash; and it comes down to one name, one year, one city.</p>
  <p>He was born to Yadyra Cardona and Juan José Huertas Vargas, the great-grandson of a woman born the day before Christmas in Arecibo, and of a man who died and was buried on Long Island, New York, far from where his own story began.</p>
  <p>He has a brother, Elkyn. And somewhere behind him, quietly proven one document at a time, is every name in this book &mdash; farmers from Añasco, a widowed mother in Lares who remarried and kept going, a man whose first marriage was almost lost to history, and a family that crossed an ocean and came back to a single grave in Arecibo.</p>
  <p>This is where the record ends, for now. It is not where the family does.</p>`},

{doc:"Polina's Line — The Vostrovs of Khimki", html:`
  <span class="eyebrow">Moscow governorate, Russia &middot; a second family joins the book</span>
  <h1>Serfs, a railway settlement, and eight generations to Polina.</h1>
  <p class="lead">In 2026, Omar married Polina Alexeevna Vostrova. Her family had already done what this whole book is built on: a professional genealogist, Olga Borisovna Kornilova, had spent years tracing the Vostrov line back to a serf born around 1800. That report is the source for everything in this chapter.</p>
  <p>The earliest name in Polina's family isn't even a full name &mdash; just <strong>Karp</strong>, no dates recorded. His son, <strong>Stepan Karpovich Vostrov</strong>, was born around 1800 and died in 1843. Stepan's son, <strong>Avvakum Stepanovich Vostrov</strong> (born around 1824), was a serf of the Satin landowners &mdash; bound to their estate the way Puerto Rico's Arocho and Montalvo ancestors were bound to nothing at all, which is its own kind of contrast worth sitting with. Serfdom in Russia didn't end until 1861. Avvakum was sent into military conscription in 1845, a fate that often meant permanent separation from home and family, but he made it back to his village by 1870. By 1883 the family had left peasant status behind for good, registering as <strong>Moscow meshane</strong> &mdash; townspeople, a legal step up in Imperial Russia's social order. Avvakum died in Moscow on 1 August 1897.</p>
  <p>Avvakum's son <strong>Ivan Avvakumovich Vostrov</strong> (born 15 August 1867) is the first of the family recorded living at <strong>Khimki</strong>, a settlement that had grown up around a railway station northwest of Moscow, on the line to Saint Petersburg. His wife was <strong>Evdokia Yakovleva</strong>. Their son <strong>Vasily Ivanovich Vostrov</strong>, born 18 March 1908 at the Khimki station settlement, kept the family rooted there &mdash; and so did his son, <strong>Gennady Aleksandrovich Vostrov</strong> (born 12 October 1937 in the city of Khimki, by then no longer just a rail stop), who married <strong>Albina Ivanovna Gromova</strong>.</p>
  <p>Gennady and Albina's daughter, <strong>Viktoria Gennadyevna Vostrova</strong>, was born 19 June 1977, also in Khimki &mdash; four generations after Ivan first settled there. Her daughter is <strong>Polina Alexeevna Vostrova</strong>, born 7 October 1996 in the city of Korolyov. Polina is Omar's wife.</p>
  <p>One detail in the report is flagged but not resolved: Polina's patronymic is "Alexeevna" (daughter of Alexey), while her listed siblings carry different patronymics &mdash; "Maksimovna" and "Andreevna" &mdash; suggesting Viktoria had children with more than one partner over the years. The report doesn't name each father directly. That's a question for Polina to answer directly, not something this book guesses at.</p>
  <div class="who">Source: "Generational Record of the Vostrov Family" (Поколенная роспись рода Востровых), commissioned by the family and researched by historian-genealogist Olga Borisovna Kornilova, report dated 1 January 2022 &mdash; photographed and archived in full, along with an English translation, in <code>records/vostrov-kudryavtseva-polina/</code>. This is pre-revolutionary and Soviet-era Russian genealogy; Ancestry and FamilySearch have essentially no independent records to cross-check it against, so this chapter rests on the strength of the commissioned research itself, the same as any other document in this book.</div>`},

{doc:"The Family Omar Built", html:`
  <span class="eyebrow">Ongoing</span>
  <h1>Not every family in this book was inherited. Some of it was chosen.</h1>
  <p class="lead">Genealogy usually runs backward &mdash; who came before, who's descended from whom, who's blood and who isn't. This page runs the other direction: the people Omar became family to on purpose, over years, not by birth.</p>
  <p>Before Polina, Omar spent twelve years with a woman named <strong>Erika</strong>. Her son, <strong>Mario Molina</strong>, became Omar's stepson for all twelve of those years &mdash; raised, not born, into the family, the same shape as Angel and Omar himself a generation earlier. Mario has a half-sister, <strong>Natalia</strong>, who shares his mother Erika but not his father.</p>
  <p>Polina brought a daughter of her own into the family: <strong>Alice</strong>, whose biological father is <strong>Justin</strong>. Omar is Alice's stepfather now, the same role Angel once filled for him &mdash; family-told, not paper-proven, and not needing to be. This book has spent most of its pages insisting that a relationship isn't real until a document says so. This page is the exception on purpose: some relationships are real because the people living them say they are, and twelve years, or a childhood, is its own kind of proof.</p>
  <div class="who">Family-told by Omar Huertas, 2026. Per this project's standing rule, direct testimony about immediate and near family counts as fact without requiring an outside document — the same standard genealogists have always applied to living memory, as distinct from claims about the distant dead.</div>`},

{doc:"Angel's Family — The Ceballos Line", html:`
  <span class="eyebrow">East Rockaway &amp; Freeport, New York &middot; 1942&ndash;2022</span>
  <h1>The man who raised Omar had a family of his own &mdash; and it turns out it was Omar's family too.</h1>
  <p class="lead">Amado Marrero Montalvo married twice. His first wife, Milagros Arocho Hernández, is Omar's direct blood line &mdash; Thelma's mother. His second wife, married in Manhattan in 1950, was <strong>Rosa Alicia Ceballo Marrero</strong>. Their son is <strong>Angel A. Marrero</strong> &mdash; Thelma's half-brother, Omar's great-uncle, and the man who actually raised Omar.</p>
  <p>Amado and Rosa lived at <strong>33 Prospect Ave, East Rockaway, New York</strong>, before Rosa later moved to Freeport &mdash; both towns in the same stretch of Nassau County where Omar's own family lived, in Baldwin, not far away at all. Omar confirmed all of this directly: he personally knew Rosa Ceballo, remembers the move from East Rockaway to Freeport, and remembers that Amado's father lived past 100 years old &mdash; which the record backs up exactly: Ramón "Moncho" Ceballo Vargas, Rosa's father, lived from 1905 to 2009, dying at 103.</p>
  <p>Rosa had a daughter besides Angel: <strong>Yvonne Harris</strong>, found through Rosa's own death record in 2026 &mdash; a name nobody currently living had mentioned, sitting quietly in a cemetery record until this year. She is Angel's half-sister the same way Angel is Thelma's.</p>
  <p>And there's a second lead still open: a family tree hint, corroborated independently by three different Ancestry researchers, names a son of Amado and Milagros who isn't in any family conversation &mdash; <strong>Juan Ramón Marrero Arocho</strong>, who Omar confirmed died in Puerto Rico at fifteen. He's now entered in the tree, though the actual 1959 death record hasn't surfaced yet.</p>
  <div class="who">Family-told by Omar Huertas, 2026-07-23, cross-checked against Rosa Ceballo's and Ramón Ceballo Vargas's Ancestry hint records (U.S. Public Records Index, Social Security Death Index, and residence directories, 1950&ndash;2021) and the 1950 New York marriage-license index.</div>`},

{doc:"Seven Generations of Ceballo, Back to Loíza", html:`
  <span class="eyebrow">Loíza &amp; Río Grande, Puerto Rico &middot; abt. 1797&ndash;2021</span>
  <h1>Following Angel's mother's family back further than almost anyone else in this book.</h1>
  <p class="lead">Rosa Ceballo's line turned out to go back further than expected, one Ancestry hint at a time, each one matched against a household that already checked out. This is the deepest confirmed generation reached anywhere in this project so far.</p>
  <p>Rosa's father was <strong>Ramón "Moncho" Ceballo Vargas</strong> (1905&ndash;2009), who married <strong>Alicia Marrero Alvelo</strong> in Bayamón in 1932. His parents were <strong>Ramón Ceballos Y Calderón</strong> (b. 1859, Río Grande County) and <strong>Nicasia Mojica Quiñones</strong> (b. abt. 1875) &mdash; a household tracked across five straight censuses, 1910 through 1940, always in the same corner of Río Grande.</p>
  <p>Ramón Ceballos Y Calderón's own parents were <strong>Mauricio Ceballos</strong> (22 Sep 1825 &ndash; 4 Oct 1888, Canóvanas/Loíza) and <strong>Eduviges Calderón y Ortiz</strong> (abt. 1835 &ndash; 27 Ago 1895, Río Grande) &mdash; confirmed by Mauricio's own baptism-record photo, matching his exact birth date, and Eduviges's own death record naming her husband and children by name. And one generation further still: Eduviges's parents were <strong>Lucas Calderón</strong> (b. abt. 1800) and <strong>Andrea Ortiz</strong> (b. abt. 1797), both of Loíza &mdash; Omar's 7th great-grandparents, and, for now, the edge of what any record can show. No hints, no further ancestors, nothing more to follow above them.</p>
  <p>Along the way, two more names surfaced that hadn't been recorded anywhere: Mauricio and Eduviges had a daughter, <strong>Catalina Ceballos Y Calderón</strong>, and a son, <strong>Jesús Ceballos Calderón</strong> &mdash; both found only because their names appeared as informants or claimants on documents that were actually about someone else.</p>
  <div class="who">Puerto Rico Civil Registrations 1885&ndash;2001 (death records for Ramón Ceballos Y Calderón, Eduviges Calderón, and Mauricio Ceballos); U.S. Federal Census 1910/1920/1930/1940 and Puerto Rico Social and Population Schedules 1935&ndash;1936; baptism-record photograph for Mauricio Ceballos shared by descendant researcher Dennis Ortiz. Confirmed generation by generation via Ancestry's Potential-parent matching, 2026-07-23.</div>`},

{doc:"Sources for the Historical Context", html:`
  <span class="eyebrow">Where the town history came from</span>
  <h1>Notes on the world around the family.</h1>
  <p class="lead">The events in this book split into two kinds: what a document says about a specific person, and what public history says about the towns they lived in. Here's where the second kind came from.</p>
  <h2>Añasco &amp; Lares, founding and coffee economy</h2>
  <p>Añasco founding history &mdash; topuertorico.org, Wikipedia. Lares founding and the coffee economy &mdash; boricua.com; "Toward Puerto Rico's Grito de Lares: Coffee, Social Stratification, and Class Conflicts, 1828&ndash;1868," <em>Hispanic American Historical Review</em>, Duke University Press.</p>
  <h2>The Grito de Lares, 1868</h2>
  <p>Encyclopedia.com, "Grito de Lares"; Library of Congress research guides.</p>
  <h2>1898 transition &amp; the 1899 San Ciriaco hurricane</h2>
  <p>Wikipedia, "1899 San Ciriaco hurricane"; Library of Congress, "World of 1898" research guide; Duke University Press, "The Hurricane of San Ciriaco: Disaster, Politics, and Society in Puerto Rico, 1899&ndash;1901."</p>
  <h2>Arecibo's economy, early 1900s</h2>
  <p>Grokipedia, "Arecibo, Puerto Rico"; U.S. Census figures for Arecibo, 1899 &amp; 1910.</p>
  <h2>The Great Migration, 1950s</h2>
  <p>HISTORY.com, "Why Puerto Rican Migration to the US Boomed After 1945"; National Trust for Historic Preservation, "Becoming 'Nuyorican'."</p>
  <div class="who">None of this history is a record of this specific family &mdash; it's the documented backdrop they lived against. Every claim about the family itself is sourced separately, on the pages where it appears.</div>`},

{back:true, html:`
  <h2>Keep going.</h2>
  <p>This book will grow as more records surface &mdash; a photograph, a certificate, a name half-remembered by someone still living. The full, interactive family tree, with every source cited and every uncertain fact marked as such, lives at the link below.</p>
  <p><strong>Máximo Arocho and María Ramona Román</strong> are the current edge of the confirmed line on one side; <strong>Pedro Marrero Nieves, Celestina González Soto, Hilario Montalvo y Centeno,</strong> and <strong>María Rodríguez y Rodríguez</strong> on the other. Somewhere behind them are more names, waiting on a record that hasn't been searched yet.</p>

];

const book=document.getElementById('book');
const total=PAGES.length;
document.getElementById('tot').textContent=total;
const pageEls=[];
PAGES.forEach((pg,i)=>{
  const el=document.createElement('div');el.className='page';
  const front=document.createElement('div');front.className='face front';
  if(pg.cover) front.classList.add('cover');
  else if(pg.back) front.classList.add('back-cover');
  if(pg.cover||pg.back){
    if(pg.cover) front.innerHTML='<div class="c-aurora"></div>'+pg.html;
    else front.innerHTML='<div class="bc-aurora"></div>'+pg.html;
  } else {
    front.innerHTML =
      '<div class="p-head"><span class="ph-brand"><span class="ph-mark">🌳</span>'+
      '<span class="ph-name">Arocho &ndash; Marrero &ndash; Huertas</span></span>'+
      '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div>'+
      '<div class="p-rule"></div>'+
      '<div class="p-body">'+pg.html+'</div>'+
      '<div class="p-foot"><span class="pf-c">A Family History</span>'+
      '<span class="pf-n">'+String(i+1).padStart(2,'0')+'</span></div>';
  }
  el.appendChild(front);
  book.appendChild(el);
  pageEls.push(el);
});

let cur=0;
function render(){
  pageEls.forEach((el,i)=>{
    const turned = i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (total - i);
  });
  document.getElementById('cur').textContent=Math.min(cur+1,total);
  document.getElementById('progress').firstElementChild.style.width=((cur)/(total-1)*100)+'%';
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=total-1;
}
function next(){if(cur<total-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
book.addEventListener('click',e=>{const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
render();
</script>
</div>
<script>
(function () {
  var HASH = "58a03e386b049cffcd66a36fc38c28adb4461a86288fca76db5e76cb6e022042";
  async function sha256(msg) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join("");
  }
  function unlock() {
    document.getElementById("gate").style.display = "none";
    document.getElementById("content").style.display = "block";
    try { sessionStorage.setItem("ft_unlocked", "1"); } catch (e) {}
  }
  async function tryPassword() {
    var pw = document.getElementById("gate-pw").value;
    var h = await sha256(pw);
    if (h === HASH) { unlock(); } else { document.getElementById("gate-err").textContent = "Wrong password."; }
  }
  document.getElementById("gate-go").addEventListener("click", tryPassword);
  document.getElementById("gate-pw").addEventListener("keydown", function (e) { if (e.key === "Enter") tryPassword(); });
  try { if (sessionStorage.getItem("ft_unlocked") === "1") unlock(); } catch (e) {}
})();
</script>
