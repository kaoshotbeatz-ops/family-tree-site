<script>
const DOC = "Family History";
const PAGES = [

{cover:true, html:`
  <div class="c-top"><span class="c-mark">🌳</span><span class="c-pill">A Family History</span></div>
  <div class="c-mid">
    <div class="c-eyebrow">Arocho &middot; Marrero &middot; Cardona &middot; Huertas</div>
    <h1>The Line <span class="accent">to Omar</span></h1>
    <p class="c-sub">From a farming family in Añasco and Lares, Puerto Rico &mdash; to the day they got to me.</p>
    <div class="c-meta">
      <div class="cm-l"><div class="cm-by">Researched and compiled by Claude, for Omar Huertas</div><div class="cm-rel">First edition &middot; July 2026</div></div>
      <div class="cm-r">Sourced from FamilySearch, Ancestry, primary family documents, and a headstone in Arecibo.</div>
    </div>
  </div>`},

{doc:"How We Know This", html:`
  <span class="eyebrow">Before the story begins</span>
  <h1>How we know this is true.</h1>
  <p class="lead">Every name in this book was checked, not assumed.</p>
  <p>This story began with a photograph of a headstone at Cementerio Privado La Santa Cruz, in Arecibo, Puerto Rico. From there, it was built outward &mdash; person by person, record by record &mdash; using FamilySearch's sourced civil and parish registrations, an Ancestry.com printout your mother compiled, and primary documents like a funeral card and downloaded Puerto Rico civil registry certificates.</p>
  <p>Along the way, a tempting but false lead surfaced: a chain that appeared to connect this family to Spanish nobility and the Aztec emperor Moctezuma I. It was checked and rejected &mdash; a real but unrelated Colombian family, wrongly merged onto one ancestor's profile by another researcher, with no genuine documentation connecting it here. That branch is not in this book. What follows is only what could be verified.</p>
  <div class="who">Where a date or fact isn't certain, this book says so &mdash; the same way the family tree site does.</div>`},

{doc:"The World Before", html:`
  <span class="eyebrow">Setting the scene &middot; not your family's own record</span>
  <h1>Añasco, before anyone in this book was born.</h1>
  <p class="lead">To understand the family, it helps to understand the ground they stood on.</p>
  <p>Añasco was founded in 1733 by a colonist from Extremadura, Spain, on land already inhabited by the Taíno people for centuries &mdash; the region is believed to be where the Taíno rebellion against Spanish rule first broke out in the early 1500s. By the time Máximo Arocho and María Ramona Román were born there, generations later, Añasco had settled into what it would remain for the next two hundred years: a rural farming town, growing plantains and provisions along the Río Grande de Añasco.</p>
  <p>Lares, twenty-some miles inland, was younger &mdash; founded in 1827, just a year or so before Martín Arocho y Román was born there. It grew up almost entirely around one crop: coffee, introduced to the island in 1736 and, by the mid-1800s, its most valuable export. The mountainous terrain around Lares was made for it.</p>
  <div class="who">This page describes the towns, not this specific family &mdash; no record yet connects Máximo or Ramona to a particular farm, plantation, or event. It's the world they were born into, as best as public history can reconstruct it.</div>`},

{doc:"Añasco & Lares", html:`
  <span class="eyebrow">The 1820s &ndash; 1890s</span>
  <h1>A family in the hills of the west.</h1>
  <p class="lead">The oldest names we can confirm belong to farming families around Añasco and Lares, in the mountainous western interior of Puerto Rico.</p>
  <p><strong>Máximo Arocho</strong> and <strong>María Ramona Román</strong> were both born in Añasco. Neither their exact birth years nor their own parents have surfaced in any record found so far &mdash; they are, for now, the edge of what can be proven on this branch.</p>
  <p>Their son, <strong>Martín Arocho y Román</strong>, was born around <span class="dates">1828</span>, in a town not yet a year old. He married twice: first to <strong>María Josefa Pérez</strong>, with six children whose names were already forgotten by the time of his death in 1910 &mdash; and second to <strong>Felipa Medina</strong>, with whom he raised at least eleven more children in Lares, among them a son named Guillermo.</p>
  <p>By the 1860s, Lares had grown into exactly the kind of coffee town its founding promised &mdash; and exactly the kind of place where the island's deepest tensions came to a head. On the night of 23 September 1868, a group of planters and reformers marched into Lares and declared Puerto Rico's independence from Spain: the <strong>Grito de Lares</strong>. Spanish troops crushed it within a day. Martín would have been about forty years old, likely still living in or near the town where it happened &mdash; though no record places him at the event itself, and this book doesn't claim one where none exists.</p>
  <p>On the other side of the family, in the same decades, <strong>Juan Rosa Núñez y Bosque</strong> (b. 1858) and <strong>Juana Francisca Méndez Núñez</strong> (b. 1865) were raising their own family, which would eventually connect to Guillermo's line through marriage.</p>
  <div class="who">Family facts confirmed via FamilySearch civil registration &amp; parish records; Martín's own 1910 death certificate was located and read in full. Town history from public sources, cited at the end of this book.</div>`},

{doc:"A Flag Changes, a Storm Arrives", html:`
  <span class="eyebrow">1898 &ndash; 1899 &middot; setting the scene</span>
  <h1>The island changed twice in one year.</h1>
  <p class="lead">Martín Arocho y Román was about seventy years old when the country he'd lived his whole life in changed flags &mdash; and then very nearly washed away.</p>
  <p>In 1898, following the Spanish&ndash;American War, the United States took control of Puerto Rico from Spain. The following August, the <strong>San Ciriaco hurricane</strong> struck &mdash; it rained for twenty-eight days, roughly 3,400 people died, and the coffee crop that towns like Lares depended on was almost entirely destroyed. It remains one of the deadliest storms in the island's history.</p>
  <p>Guillermo Arocho Medina was born a few years after, into a Puerto Rico still recovering from that storm and newly under American rule &mdash; a very different island than the one his father Martín had been born into in 1828.</p>
  <div class="who">Historical backdrop, not a specific family record. No document yet found describes how this family weathered the hurricane or the change in government &mdash; only that they were there for both.</div>`},

{doc:"A Death in Lares, 1910", html:`
  <span class="eyebrow">10 October 1910 &middot; Lares, Puerto Rico</span>
  <h1>What a death certificate remembered.</h1>
  <p class="lead">Martín Arocho y Román died at eighty-two, and the clerk who recorded it wrote down more than a date.</p>
  <p>The <em>Acta de Defunción</em>, entry number 328, names his parents &mdash; Máximo Arocho and Ramona Román, both "natural de Añasco." It records that he was first married to María Josefa Pérez, with six children whose names the informant could no longer recall. And it names his second wife, Felipa Medina, and the children they raised together: Gregoria, Eusebio, and several more, among them Guillermo.</p>
  <div class="callout"><p>This single document, downloaded and read a century later, is the reason this book knows Martín had a first marriage at all &mdash; a fact that had disappeared from every other record and from family memory.</p></div>
  <p>It is a small thing, an old man's death recorded by a village clerk. It is also the reason any of the rest of this book can be written.</p>`},

{doc:"Guillermo & María", html:`
  <span class="eyebrow">10 December 1916 &middot; Lares, Puerto Rico</span>
  <h1>A wedding, and the family it began.</h1>
  <p class="lead">Guillermo Arocho Medina married María Hernández y Núñez in Lares, in the winter of 1916.</p>
  <p>He was Martín and Felipa's son. She was the daughter of <strong>Manuel Hernández</strong> and <strong>Ricarda Núñez y Méndez</strong> &mdash; María's own mother had already lived through one marriage and would go on to a second, to Ramón Torres Martínez, adding eight more children to the family tree that would one day lead to Omar.</p>
  <p>Guillermo and María's marriage record lists him at twenty-two and her at twenty-one &mdash; ages that suggest birth years a few years earlier than the official records elsewhere carry for both of them. It is a small discrepancy, the kind that turns up constantly in century-old paperwork, and this book leaves it unresolved rather than picking a winner.</p>
  <p>Together they raised a family in Arecibo: five children lived long enough to be recorded, though two &mdash; Juan Salvador and Roberto &mdash; died in infancy. The rest were José María, Rosa María, and a daughter born the day before Christmas, 1923: <strong>Milagros</strong>.</p>
  <div class="who">Guillermo died 13 Nov 1967; María died 10 Apr 1956, Arecibo, buried the next day. Both names are on the Arecibo headstone that started this whole search.</div>`},

{doc:"Milagros", html:`
  <span class="eyebrow">20 December 1923 &middot; Arecibo, Puerto Rico</span>
  <h1>Milagros is born.</h1>
  <p class="lead">She would live seventy-two years, marry, raise a family in Arecibo, and be buried in the same cemetery her parents already occupied.</p>
  <p>Her sister <strong>Rosa María</strong> married a man named Víctor Cruz and had eight children of her own &mdash; the Cruz cousins, a whole branch of the family that grew up alongside Milagros's own children. Her brothers José María and, briefly, Juan Salvador and Roberto rounded out the household, though the two youngest never made it past infancy, a loss common enough in that era to barely register in the official record beyond a name and two dates a year apart.</p>
  <p>On Christmas Eve, 1942 &mdash; Milagros married. Her husband's name was <strong>Amado Marrero Montalvo</strong>, and his own family had roots in a different part of the island, but a story just as documented as hers.</p>`},

{doc:"The Marrero–Montalvo Line", html:`
  <span class="eyebrow">In parallel, the 1850s &ndash; 1920s</span>
  <h1>Amado's family, growing at the same time.</h1>
  <p class="lead">While Guillermo and María's family took shape in Lares and Arecibo, Amado's parents were building a life of their own.</p>
  <p><strong>Juan Ramón Marrero</strong> (b. 1883) married <strong>María Montalvo Ramos</strong> (b. 1898) in Arecibo, 1920. Juan Ramón's own parents, <strong>Pedro Marrero Nieves</strong> and <strong>Celestina González Soto</strong>, both died in 1895 &mdash; the same year, for reasons the records don't explain. María's parents, <strong>Domingo Montalvo Rodríguez</strong> and <strong>Dionicia Ramos Santiago</strong>, married in Arecibo on 22 March 1901 and went on to raise nine children of their own.</p>
  <p>Amado was born 11 May 1924, in Arecibo &mdash; the same city where, eighteen years later, he would marry Milagros.</p>
  <div class="who">This side of the family extends one generation further back than confirmed on the Arocho/Hernández side: to Amado's great-grandparents, Pedro Marrero Nieves, Celestina González Soto, Hilario Montalvo y Centeno, and María Rodríguez y Rodríguez.</div>`},

{doc:"Thelma", html:`
  <span class="eyebrow">1943</span>
  <h1>A daughter, and a family that would scatter.</h1>
  <p class="lead">Milagros and Amado's first surviving child was a daughter, Thelma.</p>
  <p>Amado's own life did not stay in Puerto Rico. His marriage to Rosa Ceballo Marrero, in Manhattan in 1950, falls right at the start of what's remembered as the <strong>Great Migration</strong> &mdash; between 1950 and 1960, roughly 470,000 Puerto Ricans, a fifth of the island's population, left for the mainland, most of them for New York City. The 1917 Jones Act had already made every Puerto Rican a U.S. citizen, free to travel without a visa; postwar factory jobs and, by the 1950s, cheap air travel did the rest. By 1950, four out of five mainland Puerto Ricans lived in New York.</p>
  <p>Amado appears to have been part of that wave. By the time he died in 1982, it was in Oceanside, on Long Island, New York, far from the Arecibo he was born in. He is buried in Roosevelt, New York &mdash; one of hundreds of thousands of that same migration, most of whom never came home.</p>
  <p>Milagros stayed. She died in Arecibo in 1996, seventy-two years old, and was buried that August in Cementerio Privado La Santa Cruz &mdash; the same plot as her parents and her sister. It is the grave that started this entire search.</p>
  <p>Thelma's own daughter, born sometime after, was named <strong>Yadyra Cardona</strong>.</p>
  <div class="who">Amado's New York dates and burial place are confirmed on FamilySearch. The Great Migration context is documented public history, not a specific record of why he went &mdash; but the timing lines up with it closely.</div>`},

{doc:"Yadyra & Juan José", html:`
  <span class="eyebrow">27 September 1950</span>
  <h1>The man who would become your father.</h1>
  <p class="lead">Juan José Huertas Vargas was born in 1950 &mdash; his mother's surname, Vargas, is the only trace of that side of the family found so far.</p>
  <p>Nothing about his own parents has surfaced yet, not in any record. What is known about him comes almost entirely from a single document: the service card printed for his funeral, on 27 November 2021, four days after he died at seventy-one.</p>
  <p>He married Yadyra Cardona &mdash; Thelma's daughter, three generations removed from the wedding in Lares in 1916, four from the death certificate that first named Máximo Arocho.</p>
  <div class="callout"><p>Everything in this book, every record and every name, exists to answer one question: who were the people whose lives, one after another, led to this marriage &mdash; and to the child it produced.</p></div>`},

{doc:"The Day They Got to Me", html:`
  <span class="eyebrow">1978</span>
  <h1>Omar.</h1>
  <p class="lead">Two centuries of farmers, clerks, witnesses, and the people who married them &mdash; and it comes down to one name, one year, one city.</p>
  <p>He was born to Yadyra Cardona and Juan José Huertas Vargas, the great-grandson of a woman born the day before Christmas in Arecibo, and of a man who died and was buried on Long Island, New York, far from where his own story began.</p>
  <p>He has a sister, Ellyn. And somewhere behind him, quietly proven one document at a time, is every name in this book &mdash; farmers from Añasco, a widowed mother in Lares who remarried and kept going, a man whose first marriage was almost lost to history, and a family that crossed an ocean and came back to a single grave in Arecibo.</p>
  <p>This is where the record ends, for now. It is not where the family does.</p>`},

{doc:"Sources for the Historical Context", html:`
  <span class="eyebrow">Where the town history came from</span>
  <h1>Notes on the world around the family.</h1>
  <p class="lead">The events in this book split into two kinds: what a document says about a specific person, and what public history says about the towns they lived in. Here's where the second kind came from.</p>
  <h2>Añasco &amp; Lares, founding and coffee economy</h2>
  <p>Añasco founding history &mdash; topuertorico.org, Wikipedia. Lares founding and the coffee economy &mdash; boricua.com; "Toward Puerto Rico's Grito de Lares: Coffee, Social Stratification, and Class Conflicts, 1828&ndash;1868," <em>Hispanic American Historical Review</em>, Duke University Press.</p>
  <h2>The Grito de Lares, 1868</h2>
  <p>Encyclopedia.com, "Grito de Lares"; Library of Congress research guides.</p>
  <h2>1898 transition &amp; the 1899 San Ciriaco hurricane</h2>
  <p>Wikipedia, "1899 San Ciriaco hurricane"; Library of Congress, "World of 1898" research guide; Duke University Press, "The Hurricane of San Ciriaco: Disaster, Politics, and Society in Puerto Rico, 1899&ndash;1901."</p>
  <h2>Arecibo's economy, early 1900s</h2>
  <p>Grokipedia, "Arecibo, Puerto Rico"; U.S. Census figures for Arecibo, 1899 &amp; 1910.</p>
  <h2>The Great Migration, 1950s</h2>
  <p>HISTORY.com, "Why Puerto Rican Migration to the US Boomed After 1945"; National Trust for Historic Preservation, "Becoming 'Nuyorican'."</p>
  <div class="who">None of this history is a record of this specific family &mdash; it's the documented backdrop they lived against. Every claim about the family itself is sourced separately, on the pages where it appears.</div>`},

{back:true, html:`
  <h2>Keep going.</h2>
  <p>This book will grow as more records surface &mdash; a photograph, a certificate, a name half-remembered by someone still living. The full, interactive family tree, with every source cited and every uncertain fact marked as such, lives at the link below.</p>
  <p><strong>Máximo Arocho and María Ramona Román</strong> are the current edge of the confirmed line on one side; <strong>Pedro Marrero Nieves, Celestina González Soto, Hilario Montalvo y Centeno,</strong> and <strong>María Rodríguez y Rodríguez</strong> on the other. Somewhere behind them are more names, waiting on a record that hasn't been searched yet.</p>
  <div class="legacy">&#9670; In memory of <strong>Guillermo Arocho Medina, Milagros Arocho Hernández,</strong> and <strong>Rosa María Arocho Hernández</strong> &mdash; Cementerio Privado La Santa Cruz, Arecibo, Puerto Rico. And of <strong>Juan José Huertas Vargas</strong>, 1950&ndash;2021.</div>
  <div class="bc-foot"><span>Compiled by Claude, for Omar Huertas</span><span>family.dbaomarhuertasllc.com</span></div>`}

const book=document.getElementById('book');
const total=PAGES.length;
document.getElementById('tot').textContent=total;
const pageEls=[];
PAGES.forEach((pg,i)=>{
  const el=document.createElement('div');el.className='page';
  const front=document.createElement('div');front.className='face front';
  if(pg.cover) front.classList.add('cover');
  else if(pg.back) front.classList.add('back-cover');
  if(pg.cover||pg.back){
    if(pg.cover) front.innerHTML='<div class="c-aurora"></div>'+pg.html;
    else front.innerHTML='<div class="bc-aurora"></div>'+pg.html;
  } else {
    front.innerHTML =
      '<div class="p-head"><span class="ph-brand"><span class="ph-mark">🌳</span>'+
      '<span class="ph-name">Arocho &ndash; Marrero &ndash; Huertas</span></span>'+
      '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div>'+
      '<div class="p-rule"></div>'+
      '<div class="p-body">'+pg.html+'</div>'+
      '<div class="p-foot"><span class="pf-c">A Family History</span>'+
      '<span class="pf-n">'+String(i+1).padStart(2,'0')+'</span></div>';
  }
  el.appendChild(front);
  book.appendChild(el);
  pageEls.push(el);
});

let cur=0;
function render(){
  pageEls.forEach((el,i)=>{
    const turned = i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (total - i);
  });
  document.getElementById('cur').textContent=Math.min(cur+1,total);
  document.getElementById('progress').firstElementChild.style.width=((cur)/(total-1)*100)+'%';
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=total-1;
}
function next(){if(cur<total-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
book.addEventListener('click',e=>{const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
render();
</script>
</div>
<script>
(function () {
  var HASH = "58a03e386b049cffcd66a36fc38c28adb4461a86288fca76db5e76cb6e022042";
  async function sha256(msg) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join("");
  }
  function unlock() {
    document.getElementById("gate").style.display = "none";
    document.getElementById("content").style.display = "block";
    try { sessionStorage.setItem("ft_unlocked", "1"); } catch (e) {}
  }
  async function tryPassword() {
    var pw = document.getElementById("gate-pw").value;
    var h = await sha256(pw);
    if (h === HASH) { unlock(); } else { document.getElementById("gate-err").textContent = "Wrong password."; }
  }
  document.getElementById("gate-go").addEventListener("click", tryPassword);
  document.getElementById("gate-pw").addEventListener("keydown", function (e) { if (e.key === "Enter") tryPassword(); });
  try { if (sessionStorage.getItem("ft_unlocked") === "1") unlock(); } catch (e) {}
})();
</script>
